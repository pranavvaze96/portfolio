<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Pranav Vaze</title>
  <meta name="description" content="Blog post by Pranav Vaze.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="assets/images/favicon.png" id="favicon" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" href="assets/images/favicon2.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/blog.css">
</head>

<body>

  <!-- ── THEME: apply before paint ─────────────────────────────────── -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- ── SKIP LINK ──────────────────────────────────────────────────── -->
  <a href="#post-main" class="skip-link">Skip to content</a>

  <!-- ══════════════════════════════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════════════════════════════════ -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="blog.html" class="nav-wordmark" aria-label="Back to Blog">← <span class="nav-wordmark-first">Blog</span></a>
      <ul class="nav-links" id="nav-links">
        <li><span class="nav-blog-active">Post</span></li>
      </ul>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">
          <span class="theme-seg theme-seg--light">☀</span>
          <span class="theme-seg theme-seg--dark">🌙</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false"
          aria-controls="mobile-overlay">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" id="mobile-overlay" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <ul class="mobile-nav-links">
      <li><a href="blog.html" class="mobile-nav-link">← Back to Blog</a></li>
      <li><a href="index.html" class="mobile-nav-link">Portfolio</a></li>
    </ul>
    <div class="mobile-theme-row">
      <span>Theme</span>
      <button class="theme-toggle" id="theme-toggle-mobile" aria-label="Switch to dark mode">
        <span class="theme-seg theme-seg--light">☀</span>
        <span class="theme-seg theme-seg--dark">🌙</span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       MAIN
  ══════════════════════════════════════════════════════════════════════ -->
  <main id="post-main">

    <div class="post-back-bar">
      <div class="container">
        <a class="post-back-btn" href="blog.html" aria-label="Back to all posts">← All Posts</a>
      </div>
    </div>

    <article class="post-article" id="post-article" role="article">
      <!-- Injected by blog.js based on ?id= query param -->
    </article>

  </main>

  <!-- ══════════════════════════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-row footer-row--top">
        <span class="footer-copy">Pranav Vaze · © 2026</span>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="index.html#about">About</a>
          <a href="index.html#resume">Resume</a>
          <a href="index.html#projects">Projects</a>
          <a href="index.html#contact">Contact</a>
          <a href="blog.html">Blog</a>
        </nav>
        <div class="footer-social">
          <a href="https://www.linkedin.com/in/pranavv11" target="_blank" rel="noopener noreferrer"
            aria-label="LinkedIn profile">LinkedIn ↗</a>
          <a href="https://github.com/pranavvaze96" target="_blank" rel="noopener noreferrer"
            aria-label="GitHub profile">GitHub ↗</a>
          <a href="https://pranavvaze.medium.com" target="_blank" rel="noopener noreferrer"
            aria-label="Medium profile">Medium ↗</a>
        </div>
      </div>
      <div class="footer-row footer-row--bottom">
        <button class="footer-top" id="back-to-top" aria-label="Scroll back to top">↑ Back to top</button>
      </div>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/cursor.js"></script>

</body>
</html>
